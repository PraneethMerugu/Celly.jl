schema_version = "1.0.0"
study_version = "phase13-transition-evidence-v1"
status = "registered-before-results"
registered_at = "2026-07-22"
decision = "0028-phase-13-entry-and-freeze-policy"
human_contract = "phase-13-statistical-registration.md"
algorithms = ["SequentialCPM", "CheckerboardSweepCPM"]
admitted_components = ["adhesion", "volume"]
excluded_algorithms = ["LotteryCPM", "TiledCheckerboardCPM"]
qualified_backends = ["cpu", "metal", "rocm"]
dimensions = [2, 3]

[backend_runtime_ids]
cpu = "cpu"
metal = "metal"
rocm = "amdgpu"

[immutability]
results_inspected_before_registration = false
threshold_changes_require_new_study_version = true
seed_changes_require_new_study_version = true
sample_count_changes_require_new_study_version = true
fixture_changes_require_new_study_version = true
observable_changes_require_new_study_version = true
pool_across_source_revisions = false

[confidence]
familywise_alpha = 0.01
simultaneous_confidence = 0.99
transition_multiplicity = "fixed Bonferroni over maximum registered rows"
realistic_multiplicity = "Holm across all applicable primary two-one-sided equivalence tests within each claim family"
secondary_confidence = 0.95
secondary_supports_stable_claim = false

[transition_rows]
source_states_per_algorithm_maximum = 24
algorithms = 2
backends = 3
maximum_rows = 144
maximum_oracle_support = 64
replicas_per_row = 262144
independent_replicas_required = true
single_trajectory_estimator_allowed = false
alpha_per_row = 6.944444444444444e-5
total_variation_margin = 0.03
maximum_absolute_probability_margin = 0.015
self_transition_probability_margin = 0.015
zero_oracle_support_observation = "fail"
raw_count_sum_must_equal_replicas = true
backend_pooling_allowed = false
unsupported_fixture_disposition = "limited-domain-unqualified"

[transition_rows.concentration]
tv_formula = "sqrt((log(2^K - 2) + log(1 / alpha_row)) / (2n))"
absolute_formula = "sqrt(log(2K / alpha_row) / (2n))"
worst_case_support = 64
worst_case_tv_radius = 0.010142757248393525
worst_case_absolute_radius = 0.005245697756318495
pinsker_reference_tv = 0.02
pinsker_expected_log_likelihood_separation = 209.7152
pass_rule = "support exact; TV_hat + r_TV <= 0.03; max_abs_residual + r_abs <= 0.015; self_residual + r_abs <= 0.015"

[transition_rows.seeds]
derivation = "base + replica_index - 1"
base_hex = "0x1300000000000000"
first_index = 1
last_index = 262144
same_set_all_backends = true
replacement_allowed = false

[transition_rows.fixture_strata]
dimensions = [2, 3]
topologies = ["von_neumann", "moore"]
boundaries = ["periodic", "no_flux"]
temperature_classes = ["zero", "finite_low", "finite_high"]
energy_scale_classes = ["zero", "nominal", "strong"]
occupancy_classes = ["sparse", "mixed", "dense"]
scheduler_state_required = true
deterministic_limits_required = true
manifest_committed_before_sampling = true

[realistic_scale]
replicas_per_identity = 512
familywise_alpha = 0.01
maximum_primary_hypotheses_per_claim_family = 96
power = 0.90
paired_standardized_mde = 0.25
independent_standardized_mde = 0.35
calculated_paired_worst_case_mde = 0.23
calculated_independent_worst_case_mde = 0.33
backend_comparison_analysis = "independent equal-size replicas"
algorithm_comparison_analysis = "paired by registered initial-layout identity"
equivalence_requires_interval_inside_margin = true
nonsignificant_difference_is_equivalence = false
workload_manifest_committed_before_sampling = true
dimensions = [2]

[realistic_scale.seeds]
base_hex = "0x1301000000000000"
first_index = 1
last_index = 512
last_seed_hex = "0x13010000000001ff"
layout_and_simulation_domains_separated = true
replacement_allowed = false

[[realistic_scale.workloads]]
id = "adhesion_volume_relaxation"
components = ["adhesion", "volume"]
primary_observables = ["energy_per_mutable_site", "volume_morphology", "boundary_morphology", "energy_autocorrelation", "morphology_autocorrelation", "mixing_time", "effective_sample_size"]
window = "fixed burn-in followed by evenly sampled stationary window"

[[realistic_scale.workloads]]
id = "differential_adhesion_sorting"
components = ["adhesion", "volume"]
primary_observables = ["energy_per_mutable_site", "heterotypic_contact_fraction", "segregation_index", "volume_morphology", "boundary_morphology", "sorting_autocorrelation", "mixing_time", "effective_sample_size"]
window = "fixed presorting burn-in followed by fixed sorting window"

[[realistic_scale.workloads]]
id = "single_cell_migration"
components = ["adhesion", "volume"]
primary_observables = ["net_displacement", "mean_squared_displacement", "speed", "persistence", "volume_morphology", "boundary_morphology", "velocity_autocorrelation", "effective_sample_size"]
window = "fixed equilibration followed by fixed migration window"

[[realistic_scale.margins]]
observable = "energy_per_mutable_site"
relative = 0.05
standardized = 0.25

[[realistic_scale.margins]]
observable = "volume_and_boundary_morphology"
relative = 0.10
standardized = 0.25
quantiles = [0.25, 0.50, 0.75]

[[realistic_scale.margins]]
observable = "sorting"
absolute = 0.05
standardized = 0.25
members = ["heterotypic_contact_fraction", "segregation_index"]

[[realistic_scale.margins]]
observable = "net_displacement"
absolute_initial_cell_diameters = 0.20
standardized = 0.25

[[realistic_scale.margins]]
observable = "migration_speed_and_persistence"
relative = 0.10
standardized = 0.25

[[realistic_scale.margins]]
observable = "integrated_autocorrelation_time"
ratio_lower = 0.8695652173913043
ratio_upper = 1.15
analysis_scale = "log"

[[realistic_scale.margins]]
observable = "mixing_time"
ratio_lower = 0.8333333333333334
ratio_upper = 1.20
analysis_scale = "log"

[[realistic_scale.margins]]
observable = "effective_sample_size_per_measured_mcs"
ratio_lower = 0.80
ratio_upper = 1.25
analysis_scale = "log"

[realistic_scale.estimators]
means = "replica-level studentized interval"
quantiles = "exact binomial order-statistic interval"
positive_times = "log-scale replica-level interval"
equivalence = "Holm-adjusted two one-sided tests at familywise alpha"
autocorrelation_parameters_fixed_in_workload_manifest = true
mixing_definition_fixed_in_workload_manifest = true
burn_in_fixed_in_workload_manifest = true
observation_cadence_fixed_in_workload_manifest = true
measured_mcs_fixed_in_workload_manifest = true

[stopping]
optional_stopping = false
early_success = false
sample_until_pass = false
deterministic_failure_stops_affected_job = true
infrastructure_rerun = "identical missing seeds only"
retain_interrupted_attempt = true
completed_seed_replacement = false
statistical_failure_requires_new_version_for_changed_plan = true
implementation_fix_requires_new_revision_and_complete_affected_family_rerun = true
pool_before_and_after_fix = false

[forensic_failure]
required = true
transition_fields = ["source_state_encoding", "source_state_fingerprint", "scheduler_phase", "oracle_row", "precision_record", "raw_counts", "empirical_row", "absolute_residuals", "total_variation", "confidence_radii", "failed_criteria", "algorithm_identity", "scheduler_identity", "rng_identity", "model_identity", "backend_identity", "seed_range", "source_revision", "environment", "reproduction_command"]
realistic_fields = ["replica_primary_summaries", "workload_fingerprint", "burn_in", "observation_schedule", "estimator_version", "adjusted_confidence_results", "endpoint_family", "seed_range", "source_revision", "environment", "reproduction_command"]
red_without_artifact_is_release_gate = false

[identity]
required = ["model_fingerprint", "initial_state_fingerprint", "algorithm_semantic_identity", "scheduler_version", "rng_contract_version", "semantic_seed_or_range", "topology", "boundary", "dimension", "acceptance_law", "temperature", "components", "backend", "precision", "fixture", "sampling_plan_version", "analysis_program_identity", "source_revision"]
semantic_scheduler_change_invalidates_evidence = true
