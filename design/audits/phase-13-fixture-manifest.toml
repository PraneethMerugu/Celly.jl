status = "registered-before-empirical-sampling"
registered_at = "2026-07-22"
statistical_plan = "phase-13-transition-evidence-v1"
maximum_empirical_source_states = 24
registered_empirical_source_states = 12
owner_encoding = "comma-separated kind:id values in Julia column-major site order"
distinct_cell_labels_preserved = true

[contract_versions]
model = "phase13-adhesion-volume-v1"
sequential_algorithm = "1.0.0"
checkerboard_scheduler = "1.0.0"
rng = "1.0.0"
analysis_program = "1.0.0"

[proposal]
selection = "uniform mutable recipient then uniform relation direction"
invalid_no_flux_destination = "self-transition"
same_owner = "self-transition"

[empirical_sampling]
replicas_per_source_state = 262144
seed_base_hex = "0x1300000000000000"
independent_replicas = true
backend_pooling = false
backends = ["cpu", "metal", "rocm"]
algorithms = ["SequentialCPM", "CheckerboardSweepCPM"]

