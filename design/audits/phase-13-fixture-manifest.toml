schema_version = "1.0.0"
manifest_version = "phase13-fixture-grid-v2"
supersedes_manifest_version = "phase13-fixture-grid-v1"
status = "registered-before-v2-qualification"
registered_at = "2026-07-22"
statistical_plan = "phase-13-transition-evidence-v2"
maximum_empirical_source_states = 24
registered_empirical_source_states = 12
owner_encoding = "comma-separated kind:id values in Julia column-major site order"
distinct_cell_labels_preserved = true

[contract_versions]
model = "phase13-adhesion-volume-v1"
sequential_algorithm = "1.0.0"
checkerboard_scheduler = "1.0.0"
rng = "1.0.0"
analysis_program = "1.0.0"

[proposal]
selection = "uniform mutable recipient then uniform relation direction"
invalid_no_flux_destination = "self-transition"
same_owner = "self-transition"

[model]
medium_owner_id = 1
medium_type_id = 1
cell_type_id = 2
cell_capacity = 2
target_volume = "1"
volume_strength = "energy_scale"
contact_matrix_base_row_major = ["0", "2", "2", "1"]
contact_matrix_multiplier = "energy_scale"
boundary_tracker = "unweighted contact-shell edge count; tracker only, not an energy"

[empirical_sampling]
production_real_type = "Float32"
precision_policy = "portable Float32 on CPU, Metal, and ROCm; oracle probabilities remain exact-rational or bounded-BigFloat"
v2_change_reason = "v1 Metal preflight exposed an inadmissible Float64 production fixture adapter; v2 changes only the adapter precision and reruns every backend identity without pooling"
replicas_per_source_state = 262144
maximum_oracle_support = 64
seed_base_hex = "0x1300000000000000"
independent_replicas = true
backend_pooling = false
backends = ["cpu", "metal", "rocm"]
algorithms = ["SequentialCPM", "CheckerboardSweepCPM"]

[[fixtures]]
id = "hand-derived-1d-noflux-zero"
purpose = "deterministic_oracle_only"
dimension = 1
dimensions = [2]
topology = "von_neumann"
boundary_class = "no_flux"
boundaries = ["no_flux"]
temperature_class = "zero"
temperature = "0"
energy_scale_class = "zero"
energy_scale = "0"
occupancy_class = "mixed"
components = ["none"]
acceptance_law = "conventional_metropolis"
empirical_source_states = []

