schema_version = "1.0.0"
status = "frozen-owner-approved"
decision = "0028-phase-13-entry-and-freeze-policy"
julia_version = "1.12.6"

[classification]
stable = "documented paper-core or public extension contract; post-freeze compatibility applies"
limited = "retained public protocol consumer outside the initial paper-core qualification"
experimental = "publicly reachable but no compatibility or paper guarantee"
internal = "implementation export; export status grants no compatibility guarantee"

[PottsToolkit]
default = "internal"
stable_documented_exports = true
stable_basis = "the root module has an intentionally curated Level 1/2 export list, but only documented bindings enter the freeze"
stable = []
limited = ["LotteryCPM"]
experimental = ["SequentialEquilibrium", "TiledCheckerboardCPM"]
internal = []

[CorePotts]
default = "internal"
stable_requires_documentation = true
inherit_stable_pottstoolkit_names = true
inherit_phase11_component_inventory = true
limited = ["LotteryCPM"]
experimental = [
    "SequentialEquilibrium",
    "TiledCheckerboardCPM",
    "TiledLayout",
    "TiledReferenceIntegrator",
    "TiledReconciliationMode",
    "TiledSharedMemoryAuto",
    "TiledSharedMemoryDisabled",
    "TiledSharedMemoryMode",
    "TiledSharedMemoryRequired",
    "TiledSnapshotAccess",
]
