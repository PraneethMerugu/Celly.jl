schema_version = "1.0.0"
manifest_version = "phase13-realistic-workloads-v1"
status = "registered-before-realistic-scale-sampling"
registered_at = "2026-07-22"
statistical_plan = "phase13-transition-evidence-v1"
replicas_per_identity = 512
seed_base_hex = "0x1301000000000000"
algorithms = ["SequentialCPM", "CheckerboardSweepCPM"]
backends = ["cpu", "metal", "rocm"]
dimension = 2
number_type = "Float32"
observation_boundary = "one synchronization after each declared observation; none inside an MCS"
layout_seed_domain = "phase13-layout-v1"
simulation_seed_domain = "phase13-dynamics-v1"

[model]
topology = "von_neumann"
boundaries = ["periodic", "periodic"]
acceptance_law = "conventional_metropolis"
temperature = 5.0
target_volume = 25.0
volume_strength = 1.0
medium_type = 1
cell_types = [2, 3]
contact_matrix_row_major = [0.0, 12.0, 12.0, 12.0, 4.0, 16.0, 12.0, 16.0, 4.0]

[analysis]
estimator_version = "phase13-realistic-analysis-v1"
autocorrelation_estimator = "initial-positive-sequence"
maximum_autocorrelation_lag = 100
mixing_definition = "first observation after burn-in whose rolling energy mean remains within five percent of the terminal-window mean"
terminal_window_observations = 20
quantiles = [0.25, 0.50, 0.75]

[[workloads]]
id = "adhesion_volume_relaxation"
dimensions = [64, 64]
cell_count = 64
type_assignment = "alternating"
initial_layout = "registered_jittered_square_blocks"
burn_in_mcs = 500
measured_mcs = 1000
observation_cadence_mcs = 10
primary_observables = ["energy_per_mutable_site", "volume_morphology", "boundary_morphology", "energy_autocorrelation", "morphology_autocorrelation", "mixing_time", "effective_sample_size"]

[[workloads]]
id = "differential_adhesion_sorting"
dimensions = [96, 96]
cell_count = 144
type_assignment = "checkerboard_two_type"
initial_layout = "registered_jittered_square_blocks"
burn_in_mcs = 1000
measured_mcs = 2000
observation_cadence_mcs = 10
primary_observables = ["energy_per_mutable_site", "heterotypic_contact_fraction", "segregation_index", "volume_morphology", "boundary_morphology", "sorting_autocorrelation", "mixing_time", "effective_sample_size"]

[[workloads]]
id = "single_cell_migration"
dimensions = [64, 64]
cell_count = 1
type_assignment = "single_type"
initial_layout = "centered_square"
burn_in_mcs = 500
measured_mcs = 2000
observation_cadence_mcs = 5
primary_observables = ["net_displacement", "mean_squared_displacement", "speed", "persistence", "volume_morphology", "boundary_morphology", "velocity_autocorrelation", "effective_sample_size"]

[[margins]]
family = "energy_per_mutable_site"
relative = 0.05
standardized = 0.25

[[margins]]
family = "volume_and_boundary_morphology"
relative = 0.10
standardized = 0.25

[[margins]]
family = "sorting"
absolute = 0.05
standardized = 0.25

[[margins]]
family = "migration_displacement"
absolute_initial_cell_diameters = 0.20
standardized = 0.25

[[margins]]
family = "migration_speed_and_persistence"
relative = 0.10
standardized = 0.25

[[margins]]
family = "autocorrelation_time"
ratio_lower = 0.8695652173913043
ratio_upper = 1.15

[[margins]]
family = "mixing_time"
ratio_lower = 0.8333333333333334
ratio_upper = 1.20

[[margins]]
family = "effective_sample_size_per_measured_mcs"
ratio_lower = 0.80
ratio_upper = 1.25
