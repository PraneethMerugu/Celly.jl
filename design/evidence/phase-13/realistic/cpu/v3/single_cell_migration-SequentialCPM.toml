reproduction_command = "julia --project=integration integration/transition/run_phase13_realistic.jl --profile qualification --workload single_cell_migration --algorithm SequentialCPM --replicas 512 --output /tmp/phase13-realistic-cpu-migration-sequential-qualification.toml --force"

[analysis]
autocorrelation_estimator = "initial-positive-sequence"
estimator_version = "phase13-realistic-analysis-v1"
maximum_autocorrelation_lag = 100
mixing_definition = "first observation after burn-in whose rolling energy mean remains within five percent of the terminal-window mean"
quantiles = [0.25, 0.5, 0.75]
terminal_window_observations = 20

[environment]
architecture = "aarch64"
julia_version = "1.12.6"
operating_system = "Darwin"
threads = 1

[identity]
algorithm = "SequentialCPM"
algorithm_contract_version = "1.0.0"
backend = "cpu"
model_fingerprint = "sha256:57fc0317a1669764bb16838b36e2c06f089546540469c51e78e1045ddddd2063"
number_type = "Float32"
rng_contract_version = "1.0.0"
scheduler = "sequential_with_replacement"
source_revision = "4998eff0aaafae7505bb5861cf6d7d96882f98ed"
