reproduction_command = "julia --project=integration integration/transition/run_phase13_realistic.jl --profile qualification --workload single_cell_migration --algorithm CheckerboardSweepCPM --replicas 512 --output /tmp/phase13-realistic-cpu-migration-checkerboard-qualification.toml --force"

[analysis]
autocorrelation_estimator = "initial-positive-sequence"
estimator_version = "phase13-realistic-analysis-v1"
maximum_autocorrelation_lag = 100
mixing_definition = "first observation after burn-in whose rolling energy mean remains within five percent of the terminal-window mean"
