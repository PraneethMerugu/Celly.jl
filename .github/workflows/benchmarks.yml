name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Authoritative Phase 12 target
        type: choice
        required: true
        default: cpu-arm64
        options: [cpu-arm64, cpu-x86_64, metal, amdgpu]
      profile:
        description: Smoke or complete baseline matrix
        type: choice
        required: true
        default: smoke
        options: [smoke, full, throughput, native-profile]
      repetitions:
        description: Independent fresh Julia processes
        type: choice
        required: true
        default: '1'
        options: ['1', '3', '5']
      precision:
        description: Numerical precision (Float64 is CPU-only in Phase 12)
        type: choice
        required: true
        default: Float32
        options: [Float32, Float64]
      cpu_threads:
        description: Julia threads on CPU (GPU jobs require 1)
        type: choice
        required: true
        default: '1'
        options: ['1', '2', '4', '8', physical]
      subject_ref:
        description: Immutable commit SHA to measure (defaults to the workflow commit)
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  # Keep duplicate dispatches for the same immutable evidence subject serialized,
  # without letting a different profile or subject evict a pending run. GitHub
  # retains only one pending member of a concurrency group even when
  # cancel-in-progress is false.
  group: benchmark-${{ inputs.backend }}-${{ inputs.profile }}-${{ inputs.precision }}-${{ inputs.cpu_threads }}-${{ inputs.subject_ref || github.sha }}
  cancel-in-progress: false

env:
  JULIA_VERSION: 1.12.6
  JULIA_NUM_PRECOMPILE_TASKS: 2

jobs:
  cpu-arm64:
    name: CPU ARM64 / ${{ inputs.profile }} / ${{ inputs.precision }} / ${{ inputs.cpu_threads }} threads / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'cpu-arm64' && vars.METAL_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, metal]
    timeout-minutes: 90
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - name: Configure fixed ARM64 physical-core count
        shell: bash
        run: |
          physical="$(sysctl -n hw.physicalcpu)"
          requested="${{ inputs.cpu_threads }}"
          threads="$requested"
          if [[ "$requested" == "physical" ]]; then threads="$physical"; fi
          if (( threads < 1 || threads > physical )); then
            echo "requested $threads Julia threads on a $physical-core host" >&2
            exit 1
          fi
          echo "JULIA_NUM_THREADS=$threads" >> "$GITHUB_ENV"
          echo "POTTS_BENCHMARK_CPU_AFFINITY=fixed-$threads-of-$physical-physical-cores; scheduler-managed on Darwin" >> "$GITHUB_ENV"
          echo "POTTS_BENCHMARK_HARDWARE_ID=metal-runner-cpu-arm64-v1-$threads-physical-threads" >> "$GITHUB_ENV"
      - run: julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent CPU processes
        if: inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/repeat.jl --backend=cpu --profile=${{ inputs.profile }} --precision=${{ inputs.precision }} --repetitions=${{ inputs.repetitions }}
      - name: Measure offline CPU precompilation
        if: inputs.precision == 'Float32' && inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/precompile_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - name: Run independent CPU cold processes
        if: inputs.precision == 'Float32' && inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/cold_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-cpu-arm64-${{ inputs.profile }}-${{ inputs.precision }}-${{ inputs.cpu_threads }}threads-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error

  cpu-x86_64:
    name: CPU x86_64 / ${{ inputs.profile }} / ${{ inputs.precision }} / ${{ inputs.cpu_threads }} threads / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'cpu-x86_64' && vars.ROCM_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, rocm]
    timeout-minutes: 90
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - name: Configure pinned x86_64 physical cores
        shell: bash
        run: |
          mapfile -t physical_cpus < <(lscpu -p=CPU,CORE,SOCKET | awk -F, '!/^#/ && !seen[$2 FS $3]++ {print $1}')
          physical="${#physical_cpus[@]}"
          requested="${{ inputs.cpu_threads }}"
          threads="$requested"
          if [[ "$requested" == "physical" ]]; then threads="$physical"; fi
          if (( threads < 1 || threads > physical )); then
            echo "requested $threads Julia threads on a $physical-core host" >&2
            exit 1
          fi
          selected=("${physical_cpus[@]:0:threads}")
          cpuset="$(IFS=,; echo "${selected[*]}")"
          echo "JULIA_NUM_THREADS=$threads" >> "$GITHUB_ENV"
          echo "POTTS_BENCHMARK_CPUSET=$cpuset" >> "$GITHUB_ENV"
          echo "POTTS_BENCHMARK_CPU_AFFINITY=taskset-one-logical-cpu-per-physical-core:$cpuset" >> "$GITHUB_ENV"
          echo "POTTS_BENCHMARK_HARDWARE_ID=rocm-runner-cpu-x86_64-v1-$threads-pinned-physical-threads" >> "$GITHUB_ENV"
      - run: taskset -c "$POTTS_BENCHMARK_CPUSET" julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent CPU processes
        if: inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: taskset -c "$POTTS_BENCHMARK_CPUSET" julia --project=benchmark --startup-file=no benchmark/repeat.jl --backend=cpu --profile=${{ inputs.profile }} --precision=${{ inputs.precision }} --repetitions=${{ inputs.repetitions }}
      - name: Measure offline CPU precompilation
        if: inputs.precision == 'Float32' && inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: taskset -c "$POTTS_BENCHMARK_CPUSET" julia --project=benchmark --startup-file=no benchmark/precompile_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - name: Run independent CPU cold processes
        if: inputs.precision == 'Float32' && inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: taskset -c "$POTTS_BENCHMARK_CPUSET" julia --project=benchmark --startup-file=no benchmark/cold_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-cpu-x86_64-${{ inputs.profile }}-${{ inputs.precision }}-${{ inputs.cpu_threads }}threads-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error

  metal:
    name: Metal / ${{ inputs.profile }} / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'metal' && vars.METAL_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, metal]
    timeout-minutes: 90
    env:
      JULIA_LOAD_PATH: "benchmark/backends/metal:benchmark:@stdlib"
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Validate GPU benchmark policy
        run: test "${{ inputs.precision }}" = "Float32" && test "${{ inputs.cpu_threads }}" = "1"
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - name: Instantiate Metal runtime
        env:
          JULIA_LOAD_PATH: "@:@stdlib"
        run: |
          julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=benchmark/backends/metal --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent Metal processes
        if: inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/repeat.jl --backend=metal --profile=${{ inputs.profile }} --precision=Float32 --repetitions=${{ inputs.repetitions }}
      - name: Measure offline Metal precompilation
        if: inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/precompile_repeat.jl --backend=metal --repetitions=${{ inputs.repetitions }}
      - name: Run independent Metal cold processes
        if: inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/cold_repeat.jl --backend=metal --repetitions=${{ inputs.repetitions }}
      - name: Capture Metal device code and chronological profile
        if: inputs.profile == 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/profile_metal.jl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-metal-${{ inputs.profile }}-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error

  rocm:
    name: ROCm / ${{ inputs.profile }} / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'amdgpu' && vars.ROCM_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, rocm]
    timeout-minutes: 90
    env:
      JULIA_LOAD_PATH: "benchmark/backends/amdgpu:benchmark:@stdlib"
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Validate GPU benchmark policy
        run: test "${{ inputs.precision }}" = "Float32" && test "${{ inputs.cpu_threads }}" = "1"
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - name: Instantiate ROCm runtime
        env:
          JULIA_LOAD_PATH: "@:@stdlib"
        run: |
          julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=benchmark/backends/amdgpu --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent ROCm processes
        if: inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/repeat.jl --backend=amdgpu --profile=${{ inputs.profile }} --precision=Float32 --repetitions=${{ inputs.repetitions }}
      - name: Measure offline ROCm precompilation
        if: inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/precompile_repeat.jl --backend=amdgpu --repetitions=${{ inputs.repetitions }}
      - name: Run independent ROCm cold processes
        if: inputs.profile != 'throughput' && inputs.profile != 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/cold_repeat.jl --backend=amdgpu --repetitions=${{ inputs.repetitions }}
      - name: Require the authoritative ROCm profiler
        if: inputs.profile == 'native-profile'
        run: command -v rocprofv3
      - name: Capture ROCm GCN and Perfetto profile
        if: inputs.profile == 'native-profile'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: |
          mkdir -p benchmark/results/rocprof
          ENABLE_JITPROFILING=1 POTTS_ROCPROF_TRACE_STATUS=captured rocprofv3 \
            --output-directory benchmark/results/rocprof --output-format pftrace \
            --hip-trace --hsa-trace --kernel-trace -- \
            julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/profile_amdgpu.jl
          find benchmark/results/rocprof -type f -name '*.pftrace' -size +0 -print -quit | grep .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-rocm-${{ inputs.profile }}-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error
