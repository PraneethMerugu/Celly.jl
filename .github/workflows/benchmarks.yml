name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Authoritative Phase 12 target
        type: choice
        required: true
        default: cpu-arm64
        options: [cpu-arm64, cpu-x86_64, metal, amdgpu]
      profile:
        description: Smoke or complete baseline matrix
        type: choice
        required: true
        default: smoke
        options: [smoke, full, throughput]
      repetitions:
        description: Independent fresh Julia processes
        type: choice
        required: true
        default: '1'
        options: ['1', '3', '5']
      subject_ref:
        description: Immutable commit SHA to measure (defaults to the workflow commit)
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  # Keep duplicate dispatches for the same immutable evidence subject serialized,
  # without letting a different profile or subject evict a pending run. GitHub
  # retains only one pending member of a concurrency group even when
  # cancel-in-progress is false.
  group: benchmark-${{ inputs.backend }}-${{ inputs.profile }}-${{ inputs.subject_ref || github.sha }}
  cancel-in-progress: false

env:
  JULIA_VERSION: 1.12.6
  JULIA_NUM_PRECOMPILE_TASKS: 2

jobs:
  cpu-arm64:
    name: CPU ARM64 / ${{ inputs.profile }} / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'cpu-arm64' && vars.METAL_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, metal]
    timeout-minutes: 90
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - run: julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent CPU processes
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-cpu-arm64-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/repeat.jl --backend=cpu --profile=${{ inputs.profile }} --repetitions=${{ inputs.repetitions }}
      - name: Measure offline CPU precompilation
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-cpu-arm64-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/precompile_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - name: Run independent CPU cold processes
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-cpu-arm64-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/cold_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-cpu-arm64-${{ inputs.profile }}-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error

  cpu-x86_64:
    name: CPU x86_64 / ${{ inputs.profile }} / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'cpu-x86_64' && vars.ROCM_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, rocm]
    timeout-minutes: 90
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - run: julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent CPU processes
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-cpu-x86_64-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/repeat.jl --backend=cpu --profile=${{ inputs.profile }} --repetitions=${{ inputs.repetitions }}
      - name: Measure offline CPU precompilation
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-cpu-x86_64-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/precompile_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - name: Run independent CPU cold processes
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-cpu-x86_64-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark --startup-file=no benchmark/cold_repeat.jl --backend=cpu --repetitions=${{ inputs.repetitions }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-cpu-x86_64-${{ inputs.profile }}-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error

  metal:
    name: Metal / ${{ inputs.profile }} / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'metal' && vars.METAL_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, metal]
    timeout-minutes: 90
    env:
      JULIA_LOAD_PATH: "benchmark/backends/metal:benchmark:@stdlib"
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - name: Instantiate Metal runtime
        env:
          JULIA_LOAD_PATH: "@:@stdlib"
        run: |
          julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=benchmark/backends/metal --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent Metal processes
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/repeat.jl --backend=metal --profile=${{ inputs.profile }} --repetitions=${{ inputs.repetitions }}
      - name: Measure offline Metal precompilation
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/precompile_repeat.jl --backend=metal --repetitions=${{ inputs.repetitions }}
      - name: Run independent Metal cold processes
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: metal-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/metal --startup-file=no benchmark/cold_repeat.jl --backend=metal --repetitions=${{ inputs.repetitions }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-metal-${{ inputs.profile }}-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error

  rocm:
    name: ROCm / ${{ inputs.profile }} / ${{ inputs.repetitions }} processes
    if: inputs.backend == 'amdgpu' && vars.ROCM_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, rocm]
    timeout-minutes: 90
    env:
      JULIA_LOAD_PATH: "benchmark/backends/amdgpu:benchmark:@stdlib"
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
          ref: ${{ inputs.subject_ref || github.sha }}
          fetch-depth: 0
      - name: Verify complete benchmark provenance
        run: test "$(git rev-parse --is-shallow-repository)" = "false"
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - name: Instantiate ROCm runtime
        env:
          JULIA_LOAD_PATH: "@:@stdlib"
        run: |
          julia --project=benchmark --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=benchmark/backends/amdgpu --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run independent ROCm processes
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/repeat.jl --backend=amdgpu --profile=${{ inputs.profile }} --repetitions=${{ inputs.repetitions }}
      - name: Measure offline ROCm precompilation
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/precompile_repeat.jl --backend=amdgpu --repetitions=${{ inputs.repetitions }}
      - name: Run independent ROCm cold processes
        if: inputs.profile != 'throughput'
        env:
          POTTS_BENCHMARK_HARDWARE_ID: rocm-runner-gpu-v1
          POTTS_BENCHMARK_POWER_MODE: ac-power
        run: julia --project=benchmark/backends/amdgpu --startup-file=no benchmark/cold_repeat.jl --backend=amdgpu --repetitions=${{ inputs.repetitions }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-rocm-${{ inputs.profile }}-${{ inputs.repetitions }}-${{ inputs.subject_ref || github.sha }}
          path: _ci/source/benchmark/results/
          if-no-files-found: error
