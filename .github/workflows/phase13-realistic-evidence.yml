name: Phase 13 realistic-scale evidence

on:
  schedule:
    - cron: '41 5 1 * *'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      backend:
        description: Backend family to qualify
        type: choice
        required: true
        default: all
        options: [all, cpu, metal, rocm]

permissions:
  contents: read

concurrency:
  group: phase13-realistic-${{ github.ref }}
  cancel-in-progress: false

env:
  JULIA_VERSION: 1.12.6
  JULIA_NUM_PRECOMPILE_TASKS: 2

jobs:
  cpu:
    name: CPU / ${{ matrix.workload }}
    if: github.event_name != 'workflow_dispatch' || inputs.backend == 'all' || inputs.backend == 'cpu'
    strategy:
      fail-fast: false
      matrix:
        workload: [adhesion_volume_relaxation, differential_adhesion_sorting, single_cell_migration]
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      BACKEND_GROUP: CPU
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
      - name: Instantiate integration environment
        run: julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run both preregistered 512-replica identities
        run: |
          mkdir -p "$RUNNER_TEMP/phase13-results/cpu"
          for algorithm in SequentialCPM CheckerboardSweepCPM; do
            julia --project=integration --startup-file=no integration/transition/run_phase13_realistic.jl \
              --workload "${{ matrix.workload }}" --algorithm "$algorithm" --profile qualification \
              --output "$RUNNER_TEMP/phase13-results/cpu/${{ matrix.workload }}-$algorithm.toml"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: phase13-realistic-cpu-${{ matrix.workload }}-${{ github.sha }}
          path: ${{ runner.temp }}/phase13-results/
          if-no-files-found: error

  metal:
    name: Metal / ${{ matrix.workload }}
    if: >-
      vars.METAL_RUNNER_ENABLED == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.backend == 'all' || inputs.backend == 'metal')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        workload: [adhesion_volume_relaxation, differential_adhesion_sorting, single_cell_migration]
    runs-on: [self-hosted, metal]
    timeout-minutes: 720
    env:
      BACKEND_GROUP: Metal
      JULIA_LOAD_PATH: "benchmark/backends/metal:integration:@stdlib"
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - name: Instantiate integration and Metal environments
        env:
          JULIA_LOAD_PATH: "@:@stdlib"
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=benchmark/backends/metal --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run the preregistered 512-replica Metal checkerboard identity
        run: |
          mkdir -p "$RUNNER_TEMP/phase13-results/metal"
          julia --project=benchmark/backends/metal --startup-file=no integration/transition/run_phase13_realistic.jl \
            --workload "${{ matrix.workload }}" --algorithm CheckerboardSweepCPM --profile qualification \
            --output "$RUNNER_TEMP/phase13-results/metal/${{ matrix.workload }}-CheckerboardSweepCPM.toml"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: phase13-realistic-metal-${{ matrix.workload }}-${{ github.sha }}
          path: ${{ runner.temp }}/phase13-results/
          if-no-files-found: error

  rocm:
    name: ROCm / ${{ matrix.workload }}
    if: >-
      vars.ROCM_RUNNER_ENABLED == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.backend == 'all' || inputs.backend == 'rocm')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        workload: [adhesion_volume_relaxation, differential_adhesion_sorting, single_cell_migration]
    runs-on: [self-hosted, rocm]
    timeout-minutes: 720
    env:
      BACKEND_GROUP: AMDGPU
      JULIA_LOAD_PATH: "benchmark/backends/amdgpu:integration:@stdlib"
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - name: Instantiate integration and ROCm environments
        env:
          JULIA_LOAD_PATH: "@:@stdlib"
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=benchmark/backends/amdgpu --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
      - name: Run the preregistered 512-replica ROCm checkerboard identity
        run: |
          mkdir -p "$RUNNER_TEMP/phase13-results/rocm"
          julia --project=benchmark/backends/amdgpu --startup-file=no integration/transition/run_phase13_realistic.jl \
            --workload "${{ matrix.workload }}" --algorithm CheckerboardSweepCPM --profile qualification \
            --output "$RUNNER_TEMP/phase13-results/rocm/${{ matrix.workload }}-CheckerboardSweepCPM.toml"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: phase13-realistic-rocm-${{ matrix.workload }}-${{ github.sha }}
          path: ${{ runner.temp }}/phase13-results/
          if-no-files-found: error

  cpu-algorithm-family:
    name: CPU algorithm claim family
    needs: [cpu]
    if: needs.cpu.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: phase13-realistic-cpu-*-${{ github.sha }}
          path: phase13-results
          merge-multiple: true
      - name: Apply Holm correction across the full CPU algorithm claim family
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=integration --startup-file=no integration/transition/analyze_phase13_realistic.jl \
            --reference "phase13-results/cpu/adhesion_volume_relaxation-SequentialCPM.toml,phase13-results/cpu/differential_adhesion_sorting-SequentialCPM.toml,phase13-results/cpu/single_cell_migration-SequentialCPM.toml" \
            --candidate "phase13-results/cpu/adhesion_volume_relaxation-CheckerboardSweepCPM.toml,phase13-results/cpu/differential_adhesion_sorting-CheckerboardSweepCPM.toml,phase13-results/cpu/single_cell_migration-CheckerboardSweepCPM.toml" \
            --comparison paired_algorithm --output phase13-results/cpu/algorithm-family-analysis.toml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: phase13-realistic-cpu-algorithm-family-${{ github.sha }}
          path: phase13-results/cpu/algorithm-family-analysis.toml
          if-no-files-found: error

  metal-portability:
    name: CPU–Metal / ${{ matrix.algorithm }} claim family
    needs: [cpu, metal]
    if: >-
      always() && vars.METAL_RUNNER_ENABLED == 'true' &&
      needs.cpu.result == 'success' && needs.metal.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        algorithm: [CheckerboardSweepCPM]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: phase13-realistic-cpu-*-${{ github.sha }}
          path: phase13-results
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: phase13-realistic-metal-*-${{ github.sha }}
          path: phase13-results
          merge-multiple: true
      - name: Instantiate and compare independent backend replicas
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=integration --startup-file=no integration/transition/analyze_phase13_realistic.jl \
            --reference "phase13-results/cpu/adhesion_volume_relaxation-${{ matrix.algorithm }}.toml,phase13-results/cpu/differential_adhesion_sorting-${{ matrix.algorithm }}.toml,phase13-results/cpu/single_cell_migration-${{ matrix.algorithm }}.toml" \
            --candidate "phase13-results/metal/adhesion_volume_relaxation-${{ matrix.algorithm }}.toml,phase13-results/metal/differential_adhesion_sorting-${{ matrix.algorithm }}.toml,phase13-results/metal/single_cell_migration-${{ matrix.algorithm }}.toml" \
            --comparison independent_backend \
            --output "phase13-results/metal/${{ matrix.algorithm }}-portability-family.toml"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: phase13-realistic-cpu-metal-${{ matrix.algorithm }}-${{ github.sha }}
          path: phase13-results/metal/*-portability-family.toml
          if-no-files-found: error

  rocm-portability:
    name: CPU–ROCm / ${{ matrix.algorithm }} claim family
    needs: [cpu, rocm]
    if: >-
      always() && vars.ROCM_RUNNER_ENABLED == 'true' &&
      needs.cpu.result == 'success' && needs.rocm.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        algorithm: [CheckerboardSweepCPM]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: phase13-realistic-cpu-*-${{ github.sha }}
          path: phase13-results
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: phase13-realistic-rocm-*-${{ github.sha }}
          path: phase13-results
          merge-multiple: true
      - name: Instantiate and compare independent backend replicas
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true)'
          julia --project=integration --startup-file=no integration/transition/analyze_phase13_realistic.jl \
            --reference "phase13-results/cpu/adhesion_volume_relaxation-${{ matrix.algorithm }}.toml,phase13-results/cpu/differential_adhesion_sorting-${{ matrix.algorithm }}.toml,phase13-results/cpu/single_cell_migration-${{ matrix.algorithm }}.toml" \
            --candidate "phase13-results/rocm/adhesion_volume_relaxation-${{ matrix.algorithm }}.toml,phase13-results/rocm/differential_adhesion_sorting-${{ matrix.algorithm }}.toml,phase13-results/rocm/single_cell_migration-${{ matrix.algorithm }}.toml" \
            --comparison independent_backend \
            --output "phase13-results/rocm/${{ matrix.algorithm }}-portability-family.toml"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: phase13-realistic-cpu-rocm-${{ matrix.algorithm }}-${{ github.sha }}
          path: phase13-results/rocm/*-portability-family.toml
          if-no-files-found: error
