name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JULIA_VERSION: 1.12.6
  JULIA_NUM_PRECOMPILE_TASKS: 2

jobs:
  project:
    name: Project integrity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
      - name: Enforce the refactor toolchain
        run: |
          julia --startup-file=no -e '
            using TOML
            expected = "1.12.6"
            projects = String[]
            for (root, dirs, files) in walkdir(pwd())
                filter!(dir -> dir != ".git", dirs)
                "Project.toml" in files && push!(projects, joinpath(root, "Project.toml"))
            end
            for project in projects
                target = get(get(TOML.parsefile(project), "compat", Dict()), "julia", nothing)
                target == expected || error("$project must set Julia compat to $expected; found $(repr(target))")
            end
            println("Validated $(length(projects)) Julia project files on Julia $VERSION")'
      - name: Resolve the Julia workspace without mutation
        run: |
          julia --project=. --startup-file=no -e '
            using Pkg
            Pkg.instantiate(; workspace=true, julia_version_strict=true,
                allow_autoprecomp=false)'
      - name: Reject whitespace errors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            git diff --check "$BASE_SHA"...HEAD
          else
            git diff --check HEAD^ HEAD
          fi

  cpu:
    name: CPU / Julia 1.12.6 / ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard: [thermodynamics, biophysics, integration, core]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_GROUP: CPU
      POTTS_TEST_SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
      - name: Instantiate the workspace
        run: |
          julia --project=. --startup-file=no -e '
            using Pkg
            Pkg.instantiate(; workspace=true, julia_version_strict=true,
                allow_autoprecomp=false)'
      - name: Run the CPU contract suite
        run: julia --project=test --startup-file=no test/runtests.jl

  cpu_macos_arm64:
    name: CPU / macOS ARM64 / Julia 1.12.6
    if: >-
      vars.METAL_RUNNER_ENABLED == 'true' &&
      (github.event_name != 'pull_request' ||
       (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'))
    runs-on: [self-hosted, metal]
    timeout-minutes: 30
    env:
      BACKEND_GROUP: CPU
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - name: Verify ARM64 runtime and instantiate workspace
        run: |
          julia --startup-file=no -e 'Sys.ARCH == :aarch64 || error("expected ARM64 Julia; found $(Sys.ARCH)")'
          julia --project=. --startup-file=no -e '
            using Pkg
            Pkg.instantiate(; workspace=true, julia_version_strict=true,
                allow_autoprecomp=false)'
      - name: Run complete CPU contract suite
        run: julia --project=test --startup-file=no test/runtests.jl

  cpu_linux_x64:
    name: CPU / Linux x86_64 / Julia 1.12.6
    if: >-
      vars.ROCM_RUNNER_ENABLED == 'true' &&
      (github.event_name != 'pull_request' ||
       (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'))
    runs-on: [self-hosted, rocm]
    timeout-minutes: 30
    env:
      BACKEND_GROUP: CPU
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - name: Verify x86_64 runtime and instantiate workspace
        run: |
          julia --startup-file=no -e 'Sys.ARCH == :x86_64 || error("expected x86_64 Julia; found $(Sys.ARCH)")'
          julia --project=. --startup-file=no -e '
            using Pkg
            Pkg.instantiate(; workspace=true, julia_version_strict=true,
                allow_autoprecomp=false)'
      - name: Run complete CPU contract suite
        run: julia --project=test --startup-file=no test/runtests.jl

  required:
    name: Required
    if: always()
    needs: [project, cpu, cpu_macos_arm64, cpu_linux_x64]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gating job
        env:
          PROJECT_RESULT: ${{ needs.project.result }}
          CPU_RESULT: ${{ needs.cpu.result }}
          MACOS_RESULT: ${{ needs.cpu_macos_arm64.result }}
          LINUX_X64_RESULT: ${{ needs.cpu_linux_x64.result }}
          METAL_ENABLED: ${{ vars.METAL_RUNNER_ENABLED }}
          ROCM_ENABLED: ${{ vars.ROCM_RUNNER_ENABLED }}
          TRUSTED_SELF_HOSTED: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        run: |
          test "$PROJECT_RESULT" = success
          test "$CPU_RESULT" = success
          if [ "$METAL_ENABLED" = true ] && [ "$TRUSTED_SELF_HOSTED" = true ]; then
            test "$MACOS_RESULT" = success
          else
            test "$MACOS_RESULT" = skipped
          fi
          if [ "$ROCM_ENABLED" = true ] && [ "$TRUSTED_SELF_HOSTED" = true ]; then
            test "$LINUX_X64_RESULT" = success
          else
            test "$LINUX_X64_RESULT" = skipped
          fi
