name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JULIA_VERSION: 1.12.6
  JULIA_NUM_PRECOMPILE_TASKS: 2

jobs:
  project:
    name: Project integrity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
      - name: Enforce repository and package structure
        run: julia --startup-file=no scripts/check_structure.jl
      - name: Enforce Phase 7 legacy containment
        run: julia --startup-file=no scripts/check_legacy_containment.jl
      - name: Resolve the package workspace without mutation
        run: |
          julia --project=. --startup-file=no -e '
            using Pkg
            Pkg.instantiate(; workspace=true, julia_version_strict=true,
                allow_autoprecomp=false)'
      - name: Reject whitespace errors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            git diff --check "$BASE_SHA"...HEAD
          else
            git diff --check HEAD^ HEAD
          fi

  packages:
    name: Package / ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: PottsToolkit
            project: .
          - package: CorePotts
            project: lib/CorePotts
          - package: MakiePotts
            project: lib/MakiePotts
          - package: NeuralPotts
            project: lib/NeuralPotts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
      - name: Test package independently
        env:
          PACKAGE: ${{ matrix.package }}
          PROJECT: ${{ matrix.project }}
        run: |
          julia --project="$PROJECT" --startup-file=no -e '
            using Pkg
            Pkg.test(ENV["PACKAGE"]; julia_args=["--startup-file=no"])'

  integration:
    name: Integration / ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard: [thermodynamics, biophysics, integration, conformance]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_GROUP: CPU
      POTTS_TEST_SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
      - name: Instantiate integration environment
        run: |
          julia --project=integration --startup-file=no -e '
            using Pkg
            Pkg.instantiate(; julia_version_strict=true, allow_autoprecomp=false)'
      - name: Run cross-package integration shard
        run: julia --project=integration --startup-file=no integration/runtests.jl

  cpu_macos_arm64:
    name: CPU / macOS ARM64 / Julia 1.12.6
    if: >-
      vars.METAL_RUNNER_ENABLED == 'true' &&
      (github.event_name != 'pull_request' ||
       (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'))
    runs-on: [self-hosted, metal]
    timeout-minutes: 45
    env:
      BACKEND_GROUP: CPU
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: aarch64
          force-arch: true
      - name: Verify ARM64 runtime
        run: julia --startup-file=no -e 'Sys.ARCH == :aarch64 || error("expected ARM64 Julia; found $(Sys.ARCH)")'
      - name: Test CorePotts and PottsToolkit independently
        run: |
          julia --project=lib/CorePotts --startup-file=no -e 'using Pkg; Pkg.test("CorePotts"; julia_args=["--startup-file=no"])'
          julia --project=. --startup-file=no -e 'using Pkg; Pkg.test("PottsToolkit"; julia_args=["--startup-file=no"])'
      - name: Run complete cross-package integration suite
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true, allow_autoprecomp=false)'
          julia --project=integration --startup-file=no integration/runtests.jl

  cpu_linux_x64:
    name: CPU / Linux x86_64 / Julia 1.12.6
    if: >-
      vars.ROCM_RUNNER_ENABLED == 'true' &&
      (github.event_name != 'pull_request' ||
       (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'))
    runs-on: [self-hosted, rocm]
    timeout-minutes: 45
    env:
      BACKEND_GROUP: CPU
    defaults:
      run:
        working-directory: _ci/source
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: _ci/source
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3
        with:
          version: ${{ env.JULIA_VERSION }}
      - name: Verify x86_64 runtime
        run: julia --startup-file=no -e 'Sys.ARCH == :x86_64 || error("expected x86_64 Julia; found $(Sys.ARCH)")'
      - name: Test CorePotts and PottsToolkit independently
        run: |
          julia --project=lib/CorePotts --startup-file=no -e 'using Pkg; Pkg.test("CorePotts"; julia_args=["--startup-file=no"])'
          julia --project=. --startup-file=no -e 'using Pkg; Pkg.test("PottsToolkit"; julia_args=["--startup-file=no"])'
      - name: Run complete cross-package integration suite
        run: |
          julia --project=integration --startup-file=no -e 'using Pkg; Pkg.instantiate(; julia_version_strict=true, allow_autoprecomp=false)'
          julia --project=integration --startup-file=no integration/runtests.jl

  required:
    name: Required
    if: always()
    needs: [project, packages, integration, cpu_macos_arm64, cpu_linux_x64]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gating job
        env:
          PROJECT_RESULT: ${{ needs.project.result }}
          PACKAGES_RESULT: ${{ needs.packages.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          MACOS_RESULT: ${{ needs.cpu_macos_arm64.result }}
          LINUX_X64_RESULT: ${{ needs.cpu_linux_x64.result }}
          METAL_ENABLED: ${{ vars.METAL_RUNNER_ENABLED }}
          ROCM_ENABLED: ${{ vars.ROCM_RUNNER_ENABLED }}
          TRUSTED_SELF_HOSTED: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        run: |
          test "$PROJECT_RESULT" = success
          test "$PACKAGES_RESULT" = success
          test "$INTEGRATION_RESULT" = success
          if [ "$METAL_ENABLED" = true ] && [ "$TRUSTED_SELF_HOSTED" = true ]; then
            test "$MACOS_RESULT" = success
          else
            test "$MACOS_RESULT" = skipped
          fi
          if [ "$ROCM_ENABLED" = true ] && [ "$TRUSTED_SELF_HOSTED" = true ]; then
            test "$LINUX_X64_RESULT" = success
          else
            test "$LINUX_X64_RESULT" = skipped
          fi
