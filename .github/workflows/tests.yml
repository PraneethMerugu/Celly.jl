name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpu-tests:
    name: CPU Tests
    runs-on: ubuntu-latest
    env:
      BACKEND_GROUP: CPU
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install monorepo packages
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="lib/CorePotts"),
              PackageSpec(path="lib/PottsToolkit"),
              PackageSpec(path="lib/MakiePotts"),
              PackageSpec(path="lib/NeuralPotts")
            ])
            Pkg.instantiate()'
      - uses: julia-actions/julia-runtest@v1

  metal-tests:
    name: Metal (Apple Silicon)
    runs-on: [self-hosted, macOS, ARM64]
    env:
      BACKEND_GROUP: Metal
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install monorepo packages
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="lib/CorePotts"),
              PackageSpec(path="lib/PottsToolkit"),
              PackageSpec(path="lib/MakiePotts"),
              PackageSpec(path="lib/NeuralPotts")
            ])
            Pkg.add("Metal")
            Pkg.instantiate()'
      - uses: julia-actions/julia-runtest@v1

  cuda-tests:
    name: CUDA (NVIDIA)
    runs-on: [self-hosted, cuda]
    env:
      BACKEND_GROUP: CUDA
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.14
        with:
          cuda: '12.3.0'
      - name: Install monorepo packages
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="lib/CorePotts"),
              PackageSpec(path="lib/PottsToolkit"),
              PackageSpec(path="lib/MakiePotts"),
              PackageSpec(path="lib/NeuralPotts")
            ])
            Pkg.add("CUDA")
            Pkg.instantiate()'
      - uses: julia-actions/julia-runtest@v1

  rocm-tests:
    name: ROCm (AMD)
    runs-on: [self-hosted, rocm]
    env:
      BACKEND_GROUP: AMDGPU
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install monorepo packages
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="lib/CorePotts"),
              PackageSpec(path="lib/PottsToolkit"),
              PackageSpec(path="lib/MakiePotts"),
              PackageSpec(path="lib/NeuralPotts")
            ])
            Pkg.add("AMDGPU")
            Pkg.instantiate()'
      - uses: julia-actions/julia-runtest@v1
